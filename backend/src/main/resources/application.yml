spring:
  application:
    name: app
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${SPRING_DATASOURCE_USERNAME:appuser}
    password: ${SPRING_DATASOURCE_PASSWORD:apppass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:changeme-in-production-min-32chars!!}
  expiration-ms: 3600000   # 1시간
  refresh-expiration-ms: 604800000  # 7일

external:
  api:
    base-url: ${EXTERNAL_API_BASE_URL:}
    api-key: ${EXTERNAL_API_KEY:}
    timeout-seconds: 30
    retry-max-attempts: 3

sync:
  scheduler:
    enabled: ${SYNC_SCHEDULER_ENABLED:true}
    # 전체 동기화: 매 10분
    full-sync-cron: "0 */10 * * * *"
    # 실패 재처리: 매 5분
    retry-cron: "0 */5 * * * *"
    # 최대 재시도 횟수
    max-retry: 3
    # 배치 처리 크기
    batch-size: 100

resilience4j:
  circuitbreaker:
    instances:
      externalApi:
        # CLOSED → OPEN: 10번 중 50% 실패 시
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 10s
        # OPEN 유지 시간 후 HALF_OPEN 전환
        wait-duration-in-open-state: 30s
        # HALF_OPEN 에서 허용할 호출 수
        permitted-number-of-calls-in-half-open-state: 5
        # 예외 분류 — 4xx는 비즈니스 오류이므로 실패로 기록하지 않음
        ignore-exceptions:
          - com.example.app.infrastructure.webclient.ExternalApiException
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - io.netty.handler.timeout.ReadTimeoutException

  retry:
    instances:
      externalApi:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # 4xx 오류는 재시도하지 않음
        ignore-exceptions:
          - com.example.app.infrastructure.webclient.ExternalApiException
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException

  timelimiter:
    instances:
      externalApi:
        timeout-duration: 30s

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.example.app: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
